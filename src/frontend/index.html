<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registration Form</title>
</head>
<body>
    <section class="container">
        <header>Registration Form</header>
        <form class="form" id="registrationForm">
            <div class="input-box">
                <label for="username">Full Name</label>
                <input type="text" id="username" name="username" placeholder="Enter full name" required>
            </div>
            
            <div class="input-box">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter email address" required>
            </div>

            <div class="column">
                <div class="input-box">
                    <label for="phnum">Phone Number</label>
                    <input type="tel" id="phnum" name="phnum" placeholder="Enter phone number" required>
                </div>
                <div class="input-box">
                    <label for="dob">Birth Date</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
            </div>

            <div class="gender-box">
                <h3>Gender</h3>
                <div class="gender-option">
                    <div class="gender">
                        <input type="radio" id="check-male" name="gender" value="Male" required>
                        <label for="check-male">Male</label>
                    </div>
                    <div class="gender">
                        <input type="radio" id="check-female" name="gender" value="Female">
                        <label for="check-female">Female</label>
                    </div>
                    <div class="gender">
                        <input type="radio" id="check-other" name="gender" value="Prefer not to say">
                        <label for="check-other">Prefer not to say</label>
                    </div>
                </div>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Submit</button>
            <p id="message"></p>
            <a href="/registrations">Go to registration</a>
        </form>
    </section>
    <script src="script.js"></script>
</body>
</html>
